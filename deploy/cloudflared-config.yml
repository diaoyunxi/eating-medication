# Cloudflare 隧道路由配置示例
# 路径：~/.cloudflared/config.yml （或通过 Zero Trust 控制台配置）
# 说明：本地服务监听 HTTP，cloudflared 建立加密隧道到 Cloudflare 边缘节点，
#       SSL 在边缘终止，按子路径转发到本地端口。
#
# 对应域名（替换 your-domain.example.com 为实际域名）：
#   https://your-domain.example.com/eating-medication/server  → 本地 :1059（服务端）
#   https://your-domain.example.com/eating-medication/family   → 本地 :4430（家属看护端）

tunnel: <TUNNEL_ID>
credentials-file: /root/.cloudflared/<TUNNEL_ID>.json

ingress:
  # 服务端：/eating-medication/server/* 转发到本地 1059
  - hostname: your-domain.example.com
    path: /eating-medication/server(.*)
    service: http://localhost:1059
  # 家属看护端：/eating-medication/family/* 转发到本地 4430
  - hostname: your-domain.example.com
    path: /eating-medication/family(.*)
    service: http://localhost:4430
  # 兜底
  - service: http_status:404
