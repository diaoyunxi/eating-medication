<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - 消息聊天</title>
    <link rel="stylesheet" href="{{ prefix }}/static/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; flex: 1; display: flex; flex-direction: column; width: 100%; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        .status { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .status-dot.connected { background: #4caf50; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .chat-box { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .msg.sent { flex-direction: row-reverse; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; }
        .msg.sent .msg-avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .msg-body { max-width: 60%; display: flex; flex-direction: column; gap: 5px; }
        .msg-name { font-size: 12px; color: #666; font-weight: 600; }
        .msg.sent .msg-name { text-align: right; }
        .msg-bubble { padding: 12px 16px; border-radius: 18px; background: #f0f0f0; color: #333; word-wrap: break-word; }
        .msg.sent .msg-bubble { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .msg-time { font-size: 11px; color: #999; }
        .msg.sent .msg-time { text-align: right; }
        .input-area { padding: 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #667eea; }
        .input-area button { padding: 12px 30px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .input-area button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        @media (max-width: 768px) { .msg-body { max-width: 75%; } }
    </style>
</head>
<body class="bg-gradient">
    <!-- 浮动装饰形状 -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    {% include '_navbar.html' %}

    <div class="container">
        <div class="header">
            <h1>💬 消息聊天</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
        </div>
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="empty" id="empty">暂无消息，开始聊天吧！</div>
            </div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
                <button id="sendBtn" disabled>发送</button>
            </div>
        </div>
    </div>
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const emptyEl = document.getElementById('empty');
        let ws = null;
        let reconnectTimer = null;
        const currentUser = '{{ current_user }}';
        const elderlyId = '{{ elderly_id }}';
        const elderlyUrl = '{{ server_url }}';
        // 从老人端 URL 提取 host+path，并选择对应的 WebSocket 协议
        const wsProto = elderlyUrl.startsWith('https') ? 'wss:' : 'ws:';
        const serverUrl = elderlyUrl.replace(/^https?:\/\//, '');

        function initWS() {
            const url = `${wsProto}//${serverUrl}/api/v1/chat/ws/${encodeURIComponent(currentUser)}`;
            ws = new WebSocket(url);
            ws.onopen = () => {
                statusDot.classList.add('connected');
                statusText.textContent = '已连接';
                sendBtn.disabled = false;
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'chat_message') {
                        addMsg(data.sender_name, data.content, data.timestamp, false);
                    }
                } catch(err) { console.error(err); }
            };
            ws.onerror = () => { statusDot.classList.remove('connected'); statusText.textContent = '连接错误'; sendBtn.disabled = true; };
            ws.onclose = () => {
                statusDot.classList.remove('connected');
                statusText.textContent = '已断开';
                sendBtn.disabled = true;
                if (!reconnectTimer) reconnectTimer = setTimeout(initWS, 5000);
            };
        }

        function sendMsg() {
            const content = inputEl.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'chat', receiver_id: parseInt(elderlyId), sender_name: currentUser, content }));
            addMsg(currentUser, content, new Date().toISOString(), true);
            inputEl.value = '';
        }

        function addMsg(sender, content, timestamp, isSent) {
            if (emptyEl) emptyEl.remove();
            // 使用 DOM 元素创建 + textContent，避免 XSS
            const div = document.createElement('div');
            div.className = isSent ? 'msg sent' : 'msg received';
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = sender.charAt(0);
            const body = document.createElement('div');
            body.className = 'msg-body';
            const nameEl = document.createElement('div');
            nameEl.className = 'msg-name';
            nameEl.textContent = sender;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = content;
            const timeEl = document.createElement('div');
            timeEl.className = 'msg-time';
            const time = new Date(timestamp);
            timeEl.textContent = time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            body.appendChild(nameEl);
            body.appendChild(bubble);
            body.appendChild(timeEl);
            div.appendChild(avatar);
            div.appendChild(body);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function loadHistory() {
            // 历史消息由服务端提供，直接请求老人端服务端 /api/v1/chat/history/{elderlyId}
            // 注意：该接口需要 JWT，未带 token 时返回 401，此处静默失败不影响实时聊天
            try {
                const resp = await fetch(`${elderlyUrl}/api/v1/chat/history/${elderlyId}`, {
                    credentials: 'include'
                });
                if (resp.ok) {
                    const msgs = await resp.json();
                    if (msgs.length > 0 && emptyEl) emptyEl.remove();
                    msgs.reverse().forEach(m => {
                        addMsg(m.sender_name, m.content, m.created_at, m.sender_id === parseInt(currentUser));
                    });
                }
            } catch(e) { console.error('加载历史消息失败:', e); }
        }

        sendBtn.addEventListener('click', sendMsg);
        inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
        window.addEventListener('load', () => { loadHistory(); initWS(); });
    </script>
</body>
</html>
