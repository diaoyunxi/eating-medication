<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - 消息聊天</title>
    <link rel="stylesheet" href="{{ prefix }}/static/css/style.css?v=2.3.0">
    <style>
        /* =============================================
           Chat 页面独立样式（Claude Design System）
           ============================================= */
        @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Poppins:wght@100..900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #faf9f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #3d3929;
        }

        h1, h2, h3 {
            font-family: 'Newsreader', 'Georgia', serif;
        }

        /* 聊天容器 */
        .chat-container {
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 16px;
        }

        /* 头部 */
        .chat-header {
            background: #ffffff;
            padding: 20px 24px;
            border-radius: 16px;
            border: 1px solid #dad9d4;
            box-shadow: 0 1px 3px rgba(61, 57, 41, 0.06);
        }

        .chat-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #3d3929;
        }

        .chat-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dad9d4;
            flex-shrink: 0;
        }

        .chat-status-dot.connected {
            background: #5a8a6a;
            animation: chatPulse 2s ease-in-out infinite;
        }

        @keyframes chatPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(90, 138, 106, 0.5); }
            50% { box-shadow: 0 0 0 6px rgba(90, 138, 106, 0); }
        }

        .chat-status-text {
            font-size: 0.85rem;
            color: #6e6d68;
            font-weight: 500;
        }

        .chat-header-divider {
            height: 1px;
            background: #dad9d4;
        }

        /* 聊天主体 */
        .chat-box {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #dad9d4;
            box-shadow: 0 1px 3px rgba(61, 57, 41, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 400px;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 消息行 */
        .chat-msg {
            display: flex;
            gap: 12px;
            animation: chatSlideIn 0.3s ease-out;
            max-width: 75%;
        }

        .chat-msg.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .chat-msg.received {
            align-self: flex-start;
        }

        @keyframes chatSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头像 */
        .chat-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
            font-family: 'Newsreader', serif;
        }

        .chat-msg.received .chat-avatar {
            background: #f0efe9;
            color: #6e6d68;
            border: 1px solid #dad9d4;
        }

        .chat-msg.sent .chat-avatar {
            background: #c96442;
            color: #ffffff;
        }

        /* 消息内容区 */
        .chat-msg-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-msg-name {
            font-size: 0.75rem;
            color: #6e6d68;
            font-weight: 500;
        }

        .chat-msg.sent .chat-msg-name {
            text-align: right;
        }

        /* 气泡 - Claude Chat Bubble 风格 */
        .chat-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .chat-msg.received .chat-bubble {
            background: #ffffff;
            color: #3d3929;
            border: 1px solid #dad9d4;
            border-top-left-radius: 4px;
        }

        .chat-msg.sent .chat-bubble {
            background: #c96442;
            color: #ffffff;
            border-top-right-radius: 4px;
        }

        .chat-msg-time {
            font-size: 0.7rem;
            color: #9e9a8f;
        }

        .chat-msg.sent .chat-msg-time {
            text-align: right;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #dad9d4;
            display: flex;
            gap: 12px;
            align-items: center;
            background: #faf9f5;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #dad9d4;
            border-radius: 24px;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            color: #3d3929;
            background: #ffffff;
            outline: none;
            transition: border-color 0.15s ease-in-out;
        }

        .chat-input:focus {
            border-color: #c96442;
            box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.1);
        }

        .chat-input::placeholder {
            color: #9e9a8f;
        }

        .chat-send-btn {
            padding: 12px 28px;
            background: #c96442;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            flex-shrink: 0;
        }

        .chat-send-btn:hover {
            background: #b8573a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(201, 100, 66, 0.3);
        }

        .chat-send-btn:active {
            transform: translateY(0);
        }

        .chat-send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 空状态 */
        .chat-empty {
            text-align: center;
            padding: 60px 20px;
            color: #9e9a8f;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .chat-empty-icon {
            width: 64px;
            height: 64px;
            background: #f0efe9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .chat-empty-text {
            font-size: 0.95rem;
        }

        /* 滚动条 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #dad9d4;
            border-radius: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #9e9a8f;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chat-container {
                padding: 12px;
            }
            .chat-msg {
                max-width: 88%;
            }
            .chat-header {
                padding: 16px;
            }
            .chat-header h1 {
                font-size: 1.25rem;
            }
            .chat-input-area {
                padding: 12px 16px;
            }
            .chat-send-btn {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <div class="chat-header-top">
                <h1>消息聊天</h1>
                <div class="chat-status">
                    <div class="chat-status-dot" id="statusDot"></div>
                    <span class="chat-status-text" id="statusText">连接中...</span>
                </div>
            </div>
            <div class="chat-header-divider"></div>
        </div>

        <!-- 聊天主体 -->
        <div class="chat-box">
            <div class="chat-messages" id="messages">
                <div class="chat-empty" id="empty">
                    <div class="chat-empty-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9e9a8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <span class="chat-empty-text">暂无消息，开始聊天吧</span>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="msgInput" placeholder="输入消息..." autocomplete="off">
                <button class="chat-send-btn" id="sendBtn" disabled>发送</button>
            </div>
        </div>
    </div>

    <script>
        // 读取 cookie 工具函数（用于 CSRF token）
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const emptyEl = document.getElementById('empty');
        let ws = null;
        let reconnectTimer = null;
        const currentUser = {{ current_user|tojson }};
        const currentUserId = {{ current_user_id|tojson }};
        const elderlyId = {{ elderly_id|tojson }};
        const elderlyUrl = {{ server_url|tojson }};
        // 从老人端 URL 提取 host+path，并选择对应的 WebSocket 协议
        const wsProto = elderlyUrl.startsWith('https') ? 'wss:' : 'ws:';
        const serverUrl = elderlyUrl.replace(/^https?:\/\//, '');

        function initWS() {
            const url = `${wsProto}//${serverUrl}/api/v1/chat/ws/${encodeURIComponent(currentUser)}`;
            ws = new WebSocket(url);
            ws.onopen = () => {
                statusDot.classList.add('connected');
                statusText.textContent = '已连接';
                sendBtn.disabled = false;
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'chat_message') {
                        addMsg(data.sender_name, data.content, data.timestamp, false);
                    }
                } catch(err) { console.error(err); }
            };
            ws.onerror = () => { statusDot.classList.remove('connected'); statusText.textContent = '连接错误'; sendBtn.disabled = true; };
            ws.onclose = () => {
                statusDot.classList.remove('connected');
                statusText.textContent = '已断开';
                sendBtn.disabled = true;
                if (!reconnectTimer) reconnectTimer = setTimeout(initWS, 5000);
            };
        }

        function sendMsg() {
            const content = inputEl.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'chat', receiver_id: elderlyId, sender_name: currentUser, content }));
            addMsg(currentUser, content, new Date().toISOString(), true);
            inputEl.value = '';
        }

        function addMsg(sender, content, timestamp, isSent) {
            if (emptyEl) emptyEl.remove();
            // 使用 DOM 元素创建 + textContent，避免 XSS
            const div = document.createElement('div');
            div.className = isSent ? 'chat-msg sent' : 'chat-msg received';
            const avatar = document.createElement('div');
            avatar.className = 'chat-avatar';
            avatar.textContent = sender.charAt(0);
            const body = document.createElement('div');
            body.className = 'chat-msg-body';
            const nameEl = document.createElement('div');
            nameEl.className = 'chat-msg-name';
            nameEl.textContent = sender;
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.textContent = content;
            const timeEl = document.createElement('div');
            timeEl.className = 'chat-msg-time';
            const time = new Date(timestamp);
            timeEl.textContent = time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            body.appendChild(nameEl);
            body.appendChild(bubble);
            body.appendChild(timeEl);
            div.appendChild(avatar);
            div.appendChild(body);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function loadHistory() {
            // S9 修复：改用子女端 BFF 代理接口 /chat/history（带 CSRF header 鉴权）
            try {
                const csrfToken = getCookie('csrf_token');
                const resp = await fetch(`{{ prefix }}/chat/history?limit=100`, {
                    headers: { 'X-CSRF-Token': csrfToken }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    const msgs = data.messages || [];
                    if (msgs.length > 0 && emptyEl) emptyEl.remove();
                    msgs.reverse().forEach(m => {
                        addMsg(m.sender_name, m.content, m.created_at, m.sender_id === currentUserId);
                    });
                }
            } catch(e) { console.error('加载历史消息失败:', e); }
        }

        sendBtn.addEventListener('click', sendMsg);
        inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
        window.addEventListener('load', () => { loadHistory(); initWS(); });
    </script>
</body>
</html>
