<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员设置 - {{ app_name }}</title>
    <link rel="stylesheet" href="{{ prefix }}/static/css/main.css">
</head>
<body>
    <div class="container">
        <h1>管理员设置</h1>
        
        {% if message %}
        <div class="alert {% if success %}alert-success{% else %}alert-error{% endif %}">
            {{ message }}
        </div>
        {% endif %}
        
        <a href="{{ prefix }}/"> 返回首页</a>
        
        <form action="{{ prefix }}/admin/settings/update" method="POST">
            <div class="form-group">
                <label>老人端服务器地址</label>
                <input type="text" name="elderly_server_url" value="{{ elderly_server_url }}">
            </div>
            
            <div class="form-group">
                <label>服务器主机</label>
                <input type="text" name="server_host" value="{{ server_host }}">
            </div>
            
            <div class="form-group">
                <label>服务器端口</label>
                <input type="number" name="server_port" value="{{ server_port }}">
            </div>
            
            <div class="form-group">
                <label>调试模式</label>
                <select name="debug_mode">
                    <option value="false" {% if not debug_mode %}selected{% endif %}>关闭</option>
                    <option value="true" {% if debug_mode %}selected{% endif %}>开启</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary">保存设置</button>
        </form>
        
        <form action="{{ prefix }}/admin/settings/secret" method="POST">
            <h2>修改密钥</h2>
            <div class="form-group">
                <label>新密钥</label>
                <input type="password" name="secret_key" required>
            </div>
            
            <button type="submit" class="btn btn-primary">更新密钥</button>
        </form>
    </div>
</body>
</html>
