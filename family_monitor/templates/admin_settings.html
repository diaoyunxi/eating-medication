<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员设置 - {{ app_name }}</title>
    <link rel="stylesheet" href="{{ prefix }}/static/css/style.css?v=2.5.0">
</head>
<body>
    <div class="bg-gradient">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px;">
            <div class="admin-card animate-fade-in">
                <div class="auth-header">
                    <div class="auth-logo">&#9881;</div>
                    <h1 class="auth-title">管理员设置</h1>
                    <p class="auth-subtitle">{{ app_name }} 系统配置</p>
                </div>

                {% if message %}
                <div class="alert {% if success %}alert-success{% else %}alert-error{% endif %}">
                    <span class="alert-icon">{% if success %}&#10003;{% else %}!{% endif %}</span>
                    <span>{{ message }}</span>
                </div>
                {% endif %}

                <!-- 服务端配置表单 -->
                <div class="admin-section">
                    <h2 class="admin-section-title">
                        <span class="admin-section-icon">&#127760;</span>
                        服务端配置
                    </h2>
                    <form action="{{ prefix }}/admin/administrator/setting/server" method="POST" class="auth-form">
                        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
                        <div class="form-group">
                            <label class="form-label" for="elderly_server_url">老人端服务器地址</label>
                            <input type="text" class="form-input" id="elderly_server_url"
                                   name="elderly_server_url" value="{{ elderly_server_url }}"
                                   placeholder="https://example.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="server_host">服务器主机</label>
                            <input type="text" class="form-input" id="server_host"
                                   name="server_host" value="{{ server_host }}"
                                   placeholder="0.0.0.0">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="server_port">服务器端口</label>
                            <input type="number" class="form-input" id="server_port"
                                   name="server_port" value="{{ server_port }}"
                                   placeholder="8080" min="1" max="65535">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-full">
                            <span>保存服务端配置</span>
                        </button>
                    </form>
                </div>

                <!-- 分隔线 -->
                <hr class="admin-divider">

                <!-- SECRET_KEY 说明 -->
                <div class="admin-section">
                    <div class="admin-notice">
                        <span class="admin-notice-icon">&#128274;</span>
                        <div>
                            <strong>SECRET_KEY</strong> 仅通过 <code>.env</code> 环境变量配置，不支持通过 Web 界面修改。请直接编辑服务器上的环境配置文件。
                        </div>
                    </div>
                </div>

                <!-- 返回首页 -->
                <div class="auth-footer">
                    <p><a href="{{ prefix }}/" class="auth-link">&#8592; 返回首页</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
