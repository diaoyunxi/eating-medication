<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{ app_name }}</title>
    <link rel="stylesheet" href="{{ prefix }}/static/css/style.css?v=2.10.0">
    <!-- Cloudflare Turnstile 人机验证 JS 库，使用显式渲染模式（render=explicit） -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <style>
        /* GitHub OAuth 登录按钮（参照 dash.cloudflare.com 风格） */
        .oauth-github-btn {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 40px;
            background: #ffffff;
            color: #0A0A0A;
            border: 1px solid #d4d4d8 !important;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .oauth-github-btn:hover {
            background: #f4f4f5;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 18px 0 14px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .auth-divider-text {
            padding: 0 12px;
        }
    </style>
</head>
<body>
    <div class="bg-gradient">
        <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
            <div class="auth-card animate-fade-in">
                <div class="auth-header">
                    <div class="auth-logo">子女守护中心</div>
                    <h1 class="auth-title">{{ app_name }}</h1>
                    <p class="auth-subtitle">登录您的账户</p>
                </div>

                {% if error %}
                <div class="alert alert-error">
                    <span class="alert-icon">!</span>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                {% if success %}
                <div class="alert alert-success">
                    <span class="alert-icon">&#10003;</span>
                    <span>{{ success }}</span>
                </div>
                {% endif %}

                <!-- AJAX 提交失败时动态显示的错误信息容器（复用原有 alert-error 样式） -->
                <div id="jsError" class="alert alert-error" style="display:none;">
                    <span class="alert-icon">!</span>
                    <span id="jsErrorMsg"></span>
                </div>

                <form method="POST" action="{{ prefix }}/login" class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">用户名</label>
                        <input type="text" class="form-input" id="username" name="username"
                               placeholder="请输入用户名" required autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <input type="password" class="form-input" id="password" name="password"
                               placeholder="请输入密码" required>
                    </div>

                    <!-- Cloudflare Turnstile 人机验证组件容器：位于密码输入框下方、提交按钮上方 -->
                    <div class="form-group">
                        <div id="turnstileContainer"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-full" id="submitBtn">
                        <span id="submitBtnText">登录</span>
                    </button>
                </form>

                <!-- GitHub OAuth 登录分隔线与按钮（默认隐藏，后端配置后由 JS 显示） -->
                <div id="githubDivider" class="auth-divider" style="display:none;">
                    <span class="auth-divider-text">或</span>
                </div>
                <div id="githubLoginBox" style="display:none;">
                    <div class="flex-1">
                        <button data-kumo-component="Button" type="button" id="githubLoginBtn"
                                aria-label="使用 GitHub 登录"
                                class="group shrink-0 font-medium select-none border-0 shadow-xs focus:outline-none cursor-pointer h-10 gap-2 rounded-lg px-4 text-base w-full flex items-center justify-center oauth-github-btn">
                            <svg width="15" height="18" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15.9971 0C7.16448 0 0.000411782 7.2028 0.000411782 16.0894C-0.0237699 19.4347 1.01764 22.7039 2.97925 25.4405C4.94085 28.1772 7.72472 30.2447 10.9422 31.3543C11.742 31.5016 12.0336 31.0049 12.0336 30.5788C12.0336 30.1968 12.0201 29.1854 12.0121 27.8426C7.56255 28.8148 6.62367 25.6857 6.62367 25.6857C5.89643 23.8275 4.84742 23.332 4.84742 23.332C3.39479 22.3338 4.95755 22.3537 4.95755 22.3537C5.46809 22.4277 5.95449 22.6158 6.37926 22.9033C6.80402 23.1908 7.15581 23.5702 7.40751 24.0121C8.83429 26.4702 11.1514 25.7623 12.0632 25.3489C12.1338 24.5372 12.4934 23.7757 13.079 23.198C9.52646 22.7925 5.78999 21.4123 5.78999 15.2469C5.76383 13.6557 6.35196 12.1137 7.43643 10.93C6.94808 9.54089 7.004 8.02324 7.59332 6.67232C7.59332 6.67232 8.93642 6.23961 11.9918 8.32169C14.611 7.59909 17.3826 7.59909 20.0018 8.32169C23.0554 6.23961 24.396 6.67232 24.396 6.67232C24.9865 8.02285 25.0434 9.54066 24.5554 10.93C25.64 12.1134 26.2276 13.6558 26.2 15.2469C26.2 21.4273 22.4598 22.7907 18.8962 23.1859C19.2798 23.5803 19.5746 24.0493 19.7617 24.5626C19.9488 25.0759 20.0239 25.6219 19.9822 26.1654C19.9822 28.3163 19.9625 30.0514 19.9625 30.5788C19.9625 31.0091 20.2504 31.5094 21.0626 31.3525C24.2777 30.2411 27.0591 28.1731 29.0189 25.437C30.9787 22.7009 32.0191 19.4331 31.9951 16.0894C31.9951 7.2028 24.8322 0 15.9971 0Z" fill="#0A0A0A"></path>
                                <path d="M3.69812 13.962C3.69812 14.0157 3.70181 14.0688 3.70242 14.1232C3.70242 14.0598 3.69812 13.9964 3.69873 13.9337L3.69812 13.962Z" fill="#0A0A0A"></path>
                                <path d="M32 13.962C32 13.9186 31.9969 13.8769 31.9969 13.8341C31.9969 13.9433 31.9969 14.0519 31.9969 14.1612C31.9957 14.0942 32 14.0308 32 13.962Z" fill="#0A0A0A"></path>
                                <path d="M32 13.7484C32 13.7001 31.9951 13.6518 31.9938 13.6035C31.9938 13.6802 31.9994 13.7568 32 13.8341C31.9963 13.8051 32 13.7773 32 13.7484Z" fill="#0A0A0A"></path>
                            </svg>
                            <span class="contents"><span>使用 GitHub 登录</span></span>
                        </button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>还没有账户？<a href="{{ prefix }}/register" class="auth-link">立即注册</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 路径前缀（Jinja2 全局变量注入，可能为空字符串）
        var prefix = "{{ prefix }}";
        // Turnstile 组件 ID，渲染后赋值，用于后续获取 token / 重置
        var widgetId = null;
        // Turnstile 是否可用（JS 加载成功 + site_key 非空 + 渲染成功）
        // 降级标志：为 false 时跳过 token 校验，允许直接提交（后端兜底）
        var turnstileAvailable = false;

        /**
         * 显示 AJAX 错误信息（复用原有 alert-error 结构）
         * @param {string} msg - 错误文案
         */
        function showJsError(msg) {
            var box = document.getElementById('jsError');
            document.getElementById('jsErrorMsg').textContent = msg;
            // .alert 默认 display 为 flex
            box.style.display = 'flex';
        }

        /**
         * 隐藏 AJAX 错误信息
         */
        function hideJsError() {
            document.getElementById('jsError').style.display = 'none';
        }

        // 页面加载完成后：获取 site_key 并显式渲染 Turnstile
        document.addEventListener('DOMContentLoaded', function () {
            // Turnstile JS 以 async/defer 加载，可能尚未就绪，轮询等待 window.turnstile 可用
            var tryCount = 0;

            function tryRender() {
                if (window.turnstile && typeof window.turnstile.render === 'function') {
                    renderTurnstile();
                } else if (tryCount < 50) {
                    tryCount++;
                    setTimeout(tryRender, 100);
                } else {
                    // 降级：Turnstile JS 加载超时（网络问题/CSP 阻止等）
                    // 允许用户继续提交，后端会根据 TURNSTILE_SECRET_KEY 配置决定是否放行
                    turnstileAvailable = false;
                    showJsError('人机验证组件加载超时，可尝试直接提交（后端将校验）');
                }
            }

            function renderTurnstile() {
                // 拉取后端下发的 site_key（GET {prefix}/turnstile/site-key）
                fetch(prefix + '/turnstile/site-key', { method: 'GET' })
                    .then(function (resp) {
                        if (!resp.ok) {
                            throw new Error('获取人机验证配置失败');
                        }
                        return resp.json();
                    })
                    .then(function (data) {
                        var siteKey = data && data.site_key;
                        if (!siteKey) {
                            // 降级：site_key 未配置（开发环境），后端 TURNSTILE_SECRET_KEY
                            // 通常也未配置，verify_turnstile 会直接返回 True
                            turnstileAvailable = false;
                            return;
                        }
                        // 显式渲染，保存 widgetId 供后续取 token / 重置
                        widgetId = window.turnstile.render(
                            document.getElementById('turnstileContainer'),
                            { sitekey: siteKey, theme: 'auto' }
                        );
                        turnstileAvailable = true;
                    })
                    .catch(function (err) {
                        // 降级：获取 site_key 失败，允许直接提交
                        turnstileAvailable = false;
                        showJsError('人机验证加载失败：' + err.message + '，可尝试直接提交');
                    });
            }

            // GitHub OAuth 登录按钮：后端配置后显示并绑定跳转
            fetch(prefix + '/oauth/github/enabled')
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    if (d && d.enabled) {
                        var box = document.getElementById('githubLoginBox');
                        var div = document.getElementById('githubDivider');
                        if (box) { box.style.display = 'block'; }
                        if (div) { div.style.display = 'flex'; }
                    }
                })
                .catch(function () { /* 忽略，按钮保持隐藏 */ });

            var ghBtn = document.getElementById('githubLoginBtn');
            if (ghBtn) {
                ghBtn.addEventListener('click', function () {
                    window.location.href = prefix + '/oauth/github/authorize';
                });
            }

            tryRender();
        });

        // 拦截表单默认提交，改为 AJAX 提交
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            hideJsError();

            // 获取 Turnstile token（用户完成验证后由组件生成）
            var token = '';
            if (turnstileAvailable && widgetId) {
                token = window.turnstile.getResponse(widgetId) || '';
                if (!token) {
                    showJsError('请先完成人机验证');
                    return;
                }
            }
            // turnstileAvailable 为 false 时降级提交（token 为空字符串，后端兜底校验）

            var submitBtn = document.getElementById('submitBtn');
            var submitBtnText = document.getElementById('submitBtnText');
            // 保存原始按钮文案，请求结束后恢复
            var originalText = submitBtnText.textContent;
            // 请求期间禁用按钮并显示"处理中..."，防止重复提交
            submitBtn.disabled = true;
            submitBtnText.textContent = '处理中...';

            // 构造表单数据：username / password / cf-turnstile-response
            var formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('cf-turnstile-response', token);

            // AJAX 提交登录（POST {prefix}/login）
            fetch(prefix + '/login', {
                method: 'POST',
                body: formData
            })
                .then(function (resp) {
                    // 即使 HTTP 非 200 也尝试解析 JSON，复用后端返回的 error 字段
                    return resp.json().then(function (data) {
                        return { ok: resp.ok, data: data };
                    });
                })
                .then(function (result) {
                    var data = result.data || {};
                    if (data.success && data.redirect) {
                        // 登录成功，跳转到后端指定地址
                        window.location.href = data.redirect;
                    } else {
                        // 登录失败：显示错误信息并重置 Turnstile，要求用户重新验证
                        showJsError(data.error || '登录失败，请重试');
                        if (turnstileAvailable && widgetId) {
                            window.turnstile.reset(widgetId);
                        }
                    }
                })
                .catch(function () {
                    // 网络异常或响应非 JSON 时的兜底
                    showJsError('网络异常，请稍后重试');
                    if (turnstileAvailable && widgetId) {
                        window.turnstile.reset(widgetId);
                    }
                })
                .finally(function () {
                    // 无论成功失败，恢复按钮可点击状态与文案
                    submitBtn.disabled = false;
                    submitBtnText.textContent = originalText;
                });
        });
    </script>
</body>
</html>
