# Alembic 配置文件

[alembic]
# 迁移脚本存放路径（H12：相对当前配置文件所在目录）
script_location = .

# 用于生成迁移脚本的模板文件
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d_%%(minute).2d_%%(second).2d_%%(slug)s

# 数据库连接 URL（会从环境变量或配置中读取，在 env.py 中覆盖）
sqlalchemy.url = sqlite:///./data/elderly_care.db

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S