name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    # 条件：同时检查 push 的提交信息 和 pull_request 的标题
    if: |
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, 'feat') ||
        contains(github.event.head_commit.message, 'fix') ||
        contains(github.event.head_commit.message, 'refactor') ||
        contains(github.event.head_commit.message, 'build')
      )) ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.title, 'feat') ||
        contains(github.event.pull_request.title, 'fix') ||
        contains(github.event.pull_request.title, 'refactor') ||
        contains(github.event.pull_request.title, 'build')
      ))
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r elderly_assistant/requirements.txt
          pip install -r server/requirements.txt
          pip install -r family_monitor/requirements.txt
          pip install "pytest==8.3.3" "pytest-asyncio==0.24.0"
      - name: Test with pytest
        run: pytest
