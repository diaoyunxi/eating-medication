[pytest]
# 测试目录（仓库根目录 tests/，CI 通过 `pytest` 从仓库根运行即可发现）
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# server 的异步用例（take_medication 等）使用 pytest-asyncio
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
